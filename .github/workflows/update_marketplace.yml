name: Update Marketplace Index

on:
  push:
    branches: [main]
    paths:
      - 'bmad-dl-*/bmad-manifest.json'
      - 'bmad-dl-*/SKILL.md'
      - 'module.yaml'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate marketplace.json
        run: |
          python3 - <<'EOF'
          import json
          import os
          from pathlib import Path

          skills = []
          module_meta = {}

          # Read module.yaml
          with open("module.yaml") as f:
              for line in f:
                  if ":" in line:
                      k, v = line.split(":", 1)
                      module_meta[k.strip()] = v.strip()

          # Scan all skill directories
          for skill_dir in sorted(Path(".").glob("bmad-dl-*")):
              if not skill_dir.is_dir():
                  continue

              manifest_path = skill_dir / "bmad-manifest.json"
              skill_path = skill_dir / "SKILL.md"

              if not manifest_path.exists():
                  continue

              with open(manifest_path) as f:
                  manifest = json.load(f)

              # Extract description from SKILL.md frontmatter
              skill_description = ""
              if skill_path.exists():
                  in_frontmatter = False
                  for line in skill_path.read_text(encoding="utf-8").splitlines():
                      line_clean = line.lstrip("\\")
                      if line_clean.strip() == "---":
                          in_frontmatter = not in_frontmatter
                          continue
                      if in_frontmatter and line_clean.startswith("description:"):
                          skill_description = line_clean.split(":", 1)[1].strip()
                          break

              for cap in manifest.get("capabilities", []):
                  skills.append({
                      "skill": skill_dir.name,
                      "name": cap.get("name"),
                      "menu-code": cap.get("menu-code"),
                      "phase": cap.get("phase-name"),
                      "description": cap.get("description") or skill_description,
                      "after": cap.get("after", []),
                      "before": cap.get("before", []),
                      "supports-headless": cap.get("supports-headless", False),
                      "is-required": cap.get("is-required", False),
                  })

          marketplace = {
              "module": {
                  "code": module_meta.get("code", "bmad-dl-lifecycle"),
                  "name": module_meta.get("name", "bmad-dl-lifecycle"),
                  "version": module_meta.get("version", ""),
                  "description": module_meta.get("description", ""),
              },
              "skills": sorted(skills, key=lambda s: s.get("phase", "z")),
          }

          with open("marketplace.json", "w") as f:
              json.dump(marketplace, f, indent=2)
              f.write("\n")

          print(f"Generated marketplace.json with {len(skills)} skills")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketplace.json
          if git diff --staged --quiet; then
            echo "No changes to marketplace.json"
          else
            git commit -m "chore: update marketplace.json [skip ci]"
            git push
          fi
