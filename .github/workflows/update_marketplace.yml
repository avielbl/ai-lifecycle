name: Update Marketplace Manifest

on:
  push:
    branches: [main]
    paths:
      - 'ai-agent-*/SKILL.md'
      - 'ai-setup/SKILL.md'
      - 'ai-setup/assets/module.yaml'
      - 'module.yaml'

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update .claude-plugin/marketplace.json
        run: |
          python3 - <<'EOF'
          import json
          from pathlib import Path

          # Read version from ai-setup/assets/module.yaml (authoritative source)
          version = "4.0.0"
          module_yaml = Path("ai-setup/assets/module.yaml")
          if module_yaml.exists():
              for line in module_yaml.read_text().splitlines():
                  if line.startswith("version:"):
                      version = line.split(":", 1)[1].strip()
                      break

          # Collect all skill directories (those containing SKILL.md)
          skills = sorted(
              f"./{d.name}"
              for d in Path(".").iterdir()
              if d.is_dir() and (d / "SKILL.md").exists()
          )

          manifest_path = Path(".claude-plugin/marketplace.json")
          existing = json.loads(manifest_path.read_text()) if manifest_path.exists() else {}

          plugin = existing.get("plugins", [{}])[0] if existing.get("plugins") else {}
          plugin.update({
              "version": version,
              "skills": skills,
          })
          existing["plugins"] = [plugin]

          manifest_path.parent.mkdir(parents=True, exist_ok=True)
          manifest_path.write_text(json.dumps(existing, indent=2) + "\n")

          print(f"Updated .claude-plugin/marketplace.json — version {version}, {len(skills)} skills: {skills}")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update marketplace.json [skip ci]"
            git push
          fi
